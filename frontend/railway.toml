[build]
builder = "RAILPACK"
buildCommand = "npm run build"

[deploy]
# No custom startCommand: Railpack serves `dist/` with Caddy. `vite preview` rejects
# Railway's healthcheck host (`healthcheck.railway.app`), causing deploy failures.
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
