services:
  postgres:
    image: postgres:16-alpine
    container_name: goli-soda-postgres
    environment:
      POSTGRES_DB: goli_soda
      POSTGRES_USER: goli_soda
      POSTGRES_PASSWORD: goli_soda_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goli_soda -d goli_soda"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: goli-soda-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
